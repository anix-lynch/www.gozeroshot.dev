name: demo-healthcheck

# Streamlit Community Cloud sleeps after ~7 days of zero traffic;
# Hugging Face Spaces sleep after ~48 hours.
# This job visits every live demo with a real browser, dismisses any sleep
# splash, and verifies the app renders past first paint. If anything is broken
# (5xx, traceback page, "Oh no" splash) the workflow fails so the owner gets a
# GitHub notification before a headhunter does.
#
# Schedule: every 36 hours covers HF cadence; Streamlit gets 4-5 visits per
# 7-day window, well under the sleep threshold.

on:
  schedule:
    - cron: "0 */36 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  ping-demos:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright Chromium
        run: |
          npm init -y
          npm i --no-save playwright
          npx playwright install --with-deps chromium

      - name: Visit + wake demos
        run: |
          cat > healthcheck.mjs <<'EOF'
          import { chromium } from "playwright";

          const DEMOS = [
            { name: "churn-ml-pipeline",        url: "https://churn-ml-pipeline-mwvbz4fzdvmd8yvjvz9jak.streamlit.app" },
            { name: "marketing-analytics-etl",  url: "https://marketing-analytics-etl.streamlit.app/" },
            { name: "ai-bi-agent",              url: "https://ai-bi-agent.streamlit.app" },
            { name: "cocktailverse",            url: "https://cocktailverse-835005185815.us-central1.run.app" },
            { name: "pied-piper-legal",         url: "https://public-ndx6vbur4-anix-lynchs-projects.vercel.app" },
            { name: "financial-modeling-hf",    url: "https://huggingface.co/spaces/anixlynch/financial-modeling-automation" },
          ];

          const TIMEOUT_MS = 90_000;
          const failures = [];

          async function check(browser, demo) {
            const ctx = await browser.newContext({ userAgent: "gozeroshot-healthcheck/1.0" });
            const page = await ctx.newPage();
            const log = (...a) => console.log(`[${demo.name}]`, ...a);
            try {
              await page.goto(demo.url, { waitUntil: "domcontentloaded", timeout: TIMEOUT_MS });

              const wake = page.getByRole("button", { name: /Yes, get this app back up/i });
              if (await wake.isVisible().catch(() => false)) {
                log("sleeping → clicking wake");
                await wake.click();
                await page.waitForLoadState("networkidle", { timeout: TIMEOUT_MS }).catch(() => {});
              }

              const hfRestart = page.getByRole("button", { name: /Restart this Space/i });
              if (await hfRestart.isVisible().catch(() => false)) {
                log("HF sleeping → restarting");
                await hfRestart.click();
                await page.waitForTimeout(3000);
              }

              await page.waitForTimeout(8000);

              const title = await page.title();
              const body  = (await page.locator("body").innerText().catch(() => "")).slice(0, 500);
              const broken = /Oh no\.|Error running app|ModuleNotFoundError|ImportError|Traceback \(most recent call last\)|This page is not configured|deployment_not_found|404 Not Found|This Space is on error|Build failed/i.test(body);

              if (broken) {
                failures.push({ name: demo.name, url: demo.url, reason: `runtime error visible: ${body.slice(0, 120)}` });
                log("BROKEN");
              } else {
                log(`OK  title="${title}"`);
              }
            } catch (err) {
              failures.push({ name: demo.name, url: demo.url, reason: err.message });
              log("FAIL", err.message);
            } finally {
              await ctx.close();
            }
          }

          const browser = await chromium.launch();
          for (const d of DEMOS) await check(browser, d);
          await browser.close();

          if (failures.length) {
            console.error("\n=== broken demos ===");
            for (const f of failures) console.error(`- ${f.name}: ${f.reason}\n  ${f.url}`);
            process.exit(1);
          }
          console.log("\nall demos healthy");
          EOF
          node healthcheck.mjs
